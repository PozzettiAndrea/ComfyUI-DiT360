[test]
levels = ["syntax", "install", "registration", "instantiation", "execution"]
publish = true

[test.workflows]
# FLUX panorama generation needs a GPU (and downloads the fp8 base on first run),
# so workflows execute on GPU only. The editing workflows (outpaint/inpaint) are
# excluded from execution while their RF-inversion path is validated on-GPU; they
# are still covered up to the instantiation level.
timeout = 1800
cpu = [
    "!dit360_t2p",
    "!dit360_outpaint",
    "!dit360_inpaint",
    "!dit360_t2p_pid_8k",
]
gpu = [
    "dit360_t2p",
    "!dit360_outpaint",
    "!dit360_inpaint",
    "!dit360_t2p_pid_8k",
]

[test.platforms]
linux = true
macos = true
windows = true
windows_portable = true
linux_gpu = true
windows_gpu = true
windows_portable_gpu = true
macos_desktop = true
windows_desktop = true
windows_desktop_gpu = true
